  var MICRO_CLIMB={"u1_foundations":[{"arc":"Awareness","t":"What Was Established","body":"Behavioural strategy was defined as the merger of strategic management with cognitive and social psychology — grounded in the work of Kahneman and advanced by Sibony — bringing rigour to how decisions are actually made rather than how they are presented. Its premise: strategic choices are never purely objective; they are the output of invisible mental filters (the shortcuts we use, the patterns we trust, the data we unconsciously ignore) operating beneath conscious analysis. Where traditional strategy asks 'What should we do?', behavioural strategy asks the prior question — 'How does the way we think shape what we believe we should do, and are those patterns helping or hurting us?' The module established the dual-process architecture (Kahneman's fast System 1 versus deliberate System 2), introduced functional bias through the Elephant Perspective, and set out a taxonomy of 20 cognitive biases across four families: Action-Oriented, Stability, Interest, and Social."},{"arc":"Intelligence","t":"Why It Matters","body":"Biases are not random fluctuations to be averaged away — they are systematic, predictable, and cumulative, acting as a silent rot that compromises even the most technically rigorous strategic frameworks. The MyHealth case made functional bias concrete: when a strategy is announced, every executive hears the same words but not the same message — the CFO listens for financial exposure, the COO for operational feasibility, the CHRO for capability implications, the CMO for the customer promise. Each interpretation is rational and valuable, but left unspoken these functional lenses quietly reshape the strategy, and the gaps between mandates open up the White Space that no one owns. The stakes were quantified: McKinsey finds disciplined, bias-mitigating decision-making delivers roughly 6% higher returns, while poor behavioural awareness levies a hidden tax through five strategic costs, each traceable to specific bias families."},{"arc":"Extrapolating","t":"Where Bias Appears","body":"Bias does not live in people alone — it lives in processes, in the specific moments where human judgement is required. The strategy journey was mapped as a bias landscape across four phases — Diagnosis, Option Generation, Decision, and Execution — each carrying its own characteristic distortions (Availability, Anchoring, and Confirmation bias cluster at Diagnosis, where every strategy begins with a reading of reality) and each paired with a scanner question to pressure-test the organisation's real exposure. A second dimension is emotional: the emotional climate is the atmospheric pressure that determines whether the organisation's thinking architecture functions or freezes. Drawing on Quy Nguyen Huy's research, emotions are the gatekeepers of System 2 — in a climate of fear or ego, people retreat into instinctive System 1 thinking — which makes managing the climate a fiduciary responsibility of leadership."},{"arc":"Integrating","t":"What Was Built","body":"The integrating arc rests on the unit's central argument: the quality of strategy is a direct function of the quality of the thinking environment — not the intelligence of individuals, nor the volume of data, but the conditions under which thinking happens. Integration solves the Elephant Perspective by shifting the leadership team out of functional silos and into an enterprise-wide lens — from defending the part to designing the whole, trading individual opinion for collective intelligence. Three pillars structure the work: Cognitive Integration (building a single version of the truth across functions), Behavioural Guardrails (the practices that keep known biases in check), and Emotional Stabilisation (protecting the climate in which careful thinking can survive). These are embedded through ten institutional practices — structural changes to how strategy is conducted, not one-time interventions — that build behavioural discipline into the strategy room and the leadership culture."}],"u2m1_lens1":[{"arc":"Awareness","t":"What Was Established","body":"Strategy was defined precisely: the output of iterative thinking, logic, and process to determine what, why, how, and when an organisation creates, delivers, and sustains value to its stakeholders while navigating forces in its operating environment. Every word carries strategic weight — OUTPUT, ITERATIVE, THINKING & LOGIC, PROCESS, the 3Ws & H, the Value Triad, STAKEHOLDERS, and NAVIGATING — each with a named failure mode when absent. Success in Practice (SiP) was introduced as the translation of strategic intent into future operating reality — what the organisation will look like, feel like, and perform like if the strategy works. SiP takes two forms: the Headline (one sentence, the portable vision anchor) and the Storyline (the four-dimensional narrative structured across Customer Experience & Value, Operational Capability & Execution Rhythm, People & Culture Dynamics, and Enterprise Value Creation)."},{"arc":"Intelligence","t":"Why It Matters","body":"Strategic intent and SiP must be co-created — not authored by one leader and distributed. Co-creation produces three irreplaceable results: leaders agree on the destination through genuine shared construction; trade-offs become visible in the room rather than in execution; and the organisation builds collective ownership of the future state — the only ownership that sustains under execution pressure. The Strategy Engine has three interlocked components. Thinking Logic is where strategic errors most often originate — not errors of data, but errors of reasoning. Most organisations over-invest in Process and Iteration while systematically neglecting Thinking Logic — producing well-structured, regularly reviewed, genuinely wrong decisions."},{"arc":"Extrapolating","t":"Where Fragmentation Appears","body":"Each SiP dimension is a multidimensional observable reality — not a single metric. Fragmentation becomes visible when key indicators are absent: customers describe interactions as transactional rather than meaningful (D1); leaders describe different priorities and decisions queue upward (D2); information is hoarded, silos dominate, and strategic alignment is absent from the floor (D3); growth is accidental rather than traceable to specific strategic choices and the organisation harvests value faster than it creates it (D4). SiP Flammables reveal where imbalance creates strategic drift — when one dimension dominates, the SiP narrows into a functional ambition rather than an enterprise picture."},{"arc":"Integration Zone","t":"What Was Built","body":"The executive team completed the 26-area Strategy Maturity Assessment across six groups: Process Components, Strategic Intent Dimensions (3W1H), Value Lifecycle, Operating Environment, Strategy Engine, and Strategic Chain. Each leader described the four SiP dimensions from their assigned role's perspective in the present tense of the future. The collective exercise surfaced convergence — where all perspectives aligned; tension — where they contradicted or competed; missing dimensions — where no leader adequately described the future state; and dominant bias — where one functional perspective over-represented the narrative. The integration produced one shared Strategic Intent Statement and one co-owned SiP — the destination anchor for the next stage of the S2R® process."}],"u2m1_lens2":[{"arc":"Awareness — What","title":"The KISS Framework as Reflective Filter","body":"Leaders recognise that KISS (Keep, Improve, Start, Stop) functions as a reflective filter between strategic vision and execution commitments. Before defining Objectives and Key Results, the leadership team must examine the organisation's current operating reality in relation to the Success in Practice narrative. This step prevents the common strategic mistake of layering new ambitions on top of an unchanged operational system."},{"arc":"Intelligence — Why","title":"Most OKR Failures are Reflection Failures","body":"When organisations move directly from vision to targets, legacy routines remain in place, resources remain misaligned, and teams attempt to pursue transformational goals while still carrying the weight of outdated priorities. The KISS-to-OKR sequence resolves this tension: SiP defines the future, KISS identifies the changes required, and OKRs translate those changes into measurable progress."},{"arc":"Extrapolating — Where","title":"Functional Bias Creates OKR Hot Zones","body":"Each leader naturally emphasises different dimensions of the future organisation. Unexamined, these perspectives produce functional OKRs instead of enterprise OKRs. Recognising these patterns allows the leadership team to integrate perspectives into a balanced execution system that reflects the full enterprise."},{"arc":"Integration — Collective","title":"Individual Expertise into Collective Intelligence","body":"In the Integration stage, each leader begins with insights from their functional domain, but the final outcome must reflect the success of the enterprise as a whole. The Prioritisation Matrix concentrates execution energy on the initiatives that will most accelerate progress toward the SiP. Deliberately limiting the enterprise OKR set ensures that attention, resources, and accountability remain focused on what matters most."}],"u2m1_lens3":[{"arc":"Awareness — What","title":"ABCV-MBT as a Pre-Execution Integrity Filter","body":"Leaders establish that a well-written OKR can still fail when the strategic conditions it silently assumes are never verified. ABCV-MBT addresses this by moving strategy from belief to testable commitment. Four integrity checkpoints — Arena (the customer end-game), Boundaries (the friction architecture), Competition (the true landscape of alternatives), and Value Proposition (coherent, defensible advantage) — each generate a Must-Be-True condition: a specific, verifiable assumption that must hold for the objective to remain valid. Naming MBTs reveals which parts of the strategy are confirmed and which are merely assumed."},{"arc":"Intelligence — Why","title":"The Industry Illusion and the Discipline of Naming MBTs","body":"This arc explains why category thinking creates blind spots: Nokia executed brilliantly inside the wrong Arena, while Netflix recognised the customer end-game had shifted from physical rental to frictionless access. The Arena must be examined across three dimensions — functional, emotional, and social — because drift and early shifts surface first in the emotional and social layers. Each ABCV lens produces a distinct category of MBT condition, and naming those conditions explicitly converts ambition into tested commitment. A strategy then rests on confirmed conditions rather than on a well-written aspiration waiting for reality to intervene."},{"arc":"Extrapolating — Where","title":"The Executive Hot Zone and Role-Based Blind Spots","body":"Leaders map how functional expertise produces selective strategic attention, so each C-suite role tends to under-examine one ABCV lens. The CEO and CSO often overlook Boundaries; the CFO, CTO, and CPO overlook Arena; the COO and CHRO overlook Competition; the CCO overlooks Value Proposition. For each role the lens names the recurring symptom, what the overlooked checkpoint actually reveals, and the right question that shifts focus from symptom to cause — for example, moving a CFO from 'the model works, so why is performance lagging?' to 'is the customer end-game we designed this model around still the right one?'"},{"arc":"Integration — Collective","title":"ABCV-MBT Working Papers and Collective Commitment","body":"In the Integration Zone, individual analysis becomes shared enterprise commitment through a four-step working-paper process. Each leader first applies all four ABCV lenses to their priority objectives and names one verifiable MBT condition per lens. The group then consolidates — surfacing shared themes, naming areas of disagreement, and agreeing the top priority MBT conditions. Clear leadership ownership is assigned to each condition (shared ownership is treated as no ownership), and supporting partners, external data needs, and a verification timeline are defined. The checkpoints turn polished OKRs into resilient execution signals grounded in enterprise reality."}],"u3m1_lens4":[{"arc":"Awareness — What","title":"What Was Established","body":"Strategy never enters an organisation as a document — it enters through two human filters: Cognition (Mind) — how individuals interpret what it means — and Emotion (Heart) — how they experience it. When these diverge across a leadership team, the Functional Bias Problem fragments execution into competing interpretations. The lens establishes Five Principles: Strategy Moves Through People; Misalignment Fragments Effort (surfacing as Chinese Whispers, Clarification Debt, Silent Disengagement); Alignment Must Be Designed (supported by the OCEAVL Assessment and the Emotional Climate Assessment); Human Reactions Are Predictable (the SCARF Model — Status, Certainty, Autonomy, Relatedness, Fairness — triggering the same threat circuitry as physical danger); and Execution Must Be Visible in Behaviour (the ACE-IT standard: Accountability, Commitment, Engagement, Integrity, Transparency)."},{"arc":"Intelligence — Why","title":"Why It Matters","body":"Heart & Mind alignment is the ignition point of strategy execution — the mechanical conversion of strategic potential energy (the document at rest) into strategic kinetic energy (movement, execution, results). Until an individual decides “this matters to me, I am willing to invest energy,” the strategy remains theoretical. Three foundational logics make the stakes operational: (I) Potential vs Kinetic Energy — the organisation does not move until people decide to move it; (II) Compliance vs Commitment — compliance (Mind only) produces visible output short-term but consumes leadership time and is mechanical rather than resilient, while commitment (Mind + Heart) generates discretionary effort, adaptive problem-solving, and resilience when leaders are not present; (III) the Strategic Payoff — aligned teams act with ownership rather than obligation, coordinate across functions, and free leaders to advance strategy rather than correct it."},{"arc":"Extrapolating — Where","title":"Where Alignment Appears","body":"Misalignment does not appear evenly — it concentrates in seven High Flammable Zones identified by the COMPASS framework: Clarity of Strategic Direction, Organizational Alignment, Management Discipline, People & Capability, Allocation of Resources, Sensing & Adaptation, and Systems & Execution. Each domain carries a signal narrative (“Everyone has a different version of what we said”; “We agreed on this — why is it not happening?”; “We say this is a priority but the resources tell a different story”; “The structure is working against the strategy”) and a diagnostic question that drives early intervention. Each is rated 1 (strong alignment) to 5 (severe misalignment), and a zone may be either a High Flammable (live leverage point) or a Burning Platform (escalated and consuming resources). Mapping where the signals are lit tells leaders where alignment work earns the highest return."},{"arc":"Integration — Collective","title":"What Was Built","body":"The executive team enters the Converging Zone — where functional interpretations integrate into a shared leadership signal and the team begins operating as a single leadership system. With Collective Intelligence present, direction remains clear across all layers, resources reinforce priorities, systems enable execution, and people move with coordinated effort. Without it, different leaders transmit different interpretations, COMPASS domains drift, and strategic instability spreads invisibly. Each CXO role carries a distinct alignment responsibility mapped to two primary COMPASS activations — the CEO anchors Clarity and Organizational Alignment; CFO/CPO activate Resources; COO/CTO/CRO drive Systems & Execution; CHRO carries People & Capability; CMO/CSO maintain Clarity and Sensing. When any role drops its responsibility, the COMPASS framework loses an anchor and the rest cannot fully converge — Collective Intelligence is the combined signal, not the sum of the individual ones."}],"u3m1_lens5":[{"arc":"Awareness — What","title":"What Was Established","body":"Performance management is not performance measurement. Measurement answers ‘what happened?’; management answers ‘what do we do about it?’ — the leadership response that turns data into decisions, actions, and accountability. The correct build sequence is therefore inverted from common practice: Define Success → Design the Management System → Design the Measurement Infrastructure → Manage Using Data (most organisations start at the last step). A complete system serves the five FACES functions — Foster a results culture, Align individual performance, Create measurement transparency, Embed shared accountability, Support continuous development. It tracks the Three Sights of Progress — Strategic OKRs, Operational KPIs, and Behavioural/Values alignment — and applies a 1–5 Rating Scale in which every rating triggers a defined leadership response and a Rating 3 (Meets Expectations) is ‘Solid Gold’, not average."},{"arc":"Intelligence — Why","title":"Why It Matters","body":"Performance management is the bridge that converts strategy into individual action through four bridge functions: Decomposing the Big Picture (enterprise outcomes → unit → team → individual), Defining the Logic of Success (a measurable, evidence-backed outcome at each level), Calibrating the Rhythm (Progress per Period = (End Target − Baseline) ÷ Number of Periods), and Structuring the Dialogue (who speaks, how often, with what authority to decide). When any function is missing, strategy leaks through the gap. Every system also rests on an architecture choice — Compliance (done to people; control and anxiety) versus Commitment (done with people; shared ownership and energy) — revealed across six dimensions. The Rules of the Game cascade in two steps (Prepare the Foundation, then Cascade ownership), and the leader is measured differently from the team: the team on in-period activities and outputs, the leader on cumulative outcome trajectory across the full cycle."},{"arc":"Extrapolating — Where","title":"Where Alignment Appears","body":"At enterprise scale the performance management system does not live in software — it lives in the executive team. The Alignment Brigade concept holds that each executive function owns a distinct ‘hot zone’ it is best positioned to track; integrated through a shared cadence and language the C-suite becomes a precision measurement system, but operating independently it produces competing narratives. Ten CXO Hot Zones map these contributions (CEO enterprise visibility, CFO financial signals, COO execution rhythm, CHRO capability & behaviour, and so on). Three Execution Gaps account for most enterprise PM failure — Competing Definitions of Progress, Measurement Blind Spots, and Incentive Misalignment (a design failure, not a motivation failure). The industry is shifting accordingly: 41% of organisations have moved to real-time feedback, trending from annual to continuous, rating-centric to development-centric, and individual to team performance."},{"arc":"Integration — Collective","title":"What Was Built","body":"At the integration level the executive team converges on one question — are we collectively progressing toward our strategic intent? This Collective Progress Signal anchors three executive question types: Execution Traction (are we generating the expected progress?), Execution Balance (are resources invested in the right proportions?), and Execution Intervention (where must we act now?). A complete enterprise design integrates three elements at different horizons — Reporting Cadence (When), Periodic Measures (What Now: current, comparable, actionable), and Cumulative Progress (How Far), calculated as Cumulative Progress % = (Baseline − Current) ÷ (Baseline − Target) × 100, which exposes a trajectory that single-period gains can mask. The nine-principle EXECUTION framework synthesises the design standard — Enterprise (strategy first), eXecution (line-of-sight), Evidence-based, Collective ownership, Understand outcomes not activity, Transparent logic, Incentive alignment, Ongoing rhythm, and Navigate by collective insight — used as a 1–5 self-diagnostic of any PM system."}],"u3m1_lens6":[{"arc":"Awareness — What","title":"What Was Established","body":"Execution does not begin when a delivery goal is written — it begins when the person responsible internalises the expectation and accepts ownership. The defining distinction is Setting an expectation (top-down instruction; understanding assumed to equal commitment) versus Establishing one (a structured alignment process that secures ownership). A KPI becomes a personal leadership promise only when three conditions are simultaneously confirmed: Clarity (a shared picture of what success looks like), Capability (the surrounding system can realistically support delivery), and Commitment (the person consciously accepts ownership of the result). Two mechanisms close the gap: the Expectations Chain — mapping the Upline, Downline, and External actors whose work affects the outcome — and the Alignment Dialogue, which tests commitment by asking, on a 1–10 scale, how aligned the person is (a score below 9 means commitment is not yet established)."},{"arc":"Intelligence — Why","title":"Why It Matters","body":"The moment expectations are clarified between leader and contributor is the moment a target transitions from organisational intention to personal responsibility. Compliance-driven execution escalates obstacles upward, owns activities rather than results, and withholds discretionary effort (“I completed everything that was asked of me”); commitment-driven execution takes initiative, owns the outcome, and invests fully (“I’ll make sure this gets delivered”). Five mechanisms explain why establishing expectations determines outcomes: moving from Instruction to Ownership; Reducing Interpretation Ambiguity; Surfacing Constraints before execution begins; Strengthening Accountability; and Building the Behavioural Foundation of execution. When the step is skipped, two casualties follow — Engagement weakens first (work happens but energy is not invested), and Accountability dilutes as the deeper cost (many feel partially responsible; none is fully accountable). The issue is rarely effort — it is that ownership was assigned without being secured."},{"arc":"Extrapolating — Where","title":"Where the Gap Appears","body":"The expectations gap is not random — it concentrates by executive function. Each CXO communicates expectations through the mechanisms it controls, and each control creates a characteristic gap. The CEO sets enterprise ambition and assumes strategic clarity cascades into delivery commitment; the CFO sets precise financial targets without confirming the cross-functional conditions to hit them; the COO achieves process compliance but not outcome ownership; the CHRO builds cultural alignment not linked to commercial delivery; the CTO/CIO ships technical milestones whose business value goes unowned; the CMO and CCO set market and revenue targets without aligning the operational chain that sustains them; the CPO, CRO, and CSO secure supplier terms, governance rules, and plans that stay procedural rather than internalised. The common pattern: functional expertise biases leaders toward setting rather than establishing — and surface alignment conceals unresolved ownership beneath it."},{"arc":"Integration — Collective","title":"What Was Built","body":"The Expectation Architecture is a four-step practice every leader can apply consistently. (1) Start With the Future — connect the expectation to the organisation’s Success in Practice so the person understands why it matters, not just what it is. (2) Clarify the Delivery Expectation — define the outcome in result terms, tested by asking the person to describe success in their own words. (3) Identify the Expectations Chain — make the Upline, Downline, and External dependencies visible before execution begins. (4) Confirm Ownership — ask the 1–10 alignment question; 9–10 proceeds, below 9 triggers the Alignment Dialogue. That dialogue runs Score → Evaluate → Resolve: read the score as data, explore what is preventing full alignment without challenging the number, then ask “What would help move your alignment to a 9 or 10?” and re-score. Each conversation closes with three leader reflections — Alignment Rating, Primary Concern, and Action for Elevation — converting a conversation into a commitment record."}],"u3m2_lens7":[{"arc":"Awareness — What","title":"What Was Established","body":"Performance measurement is not a reporting exercise — it is an execution-visibility discipline. Strategy fails not at the level of intention but of visibility, so the discipline shifts the question from “What work was done?” (activity) to “What changed because of the work?” (progress). It serves four strategic purposes — Visibility, Accountability, Learning, and Course Correction — and operates through the Review–Realign–Restore (R3) Cycle: Review establishes evidence-based visibility (KPI-owner self-assessment + parallel leader assessment against three anchor questions); Realign activates the Accountability Loop when a gap appears, diagnosing one of three root causes (lack of accountability, lack of skill, or structural misfit) each with its own recovery; and Restore converts insight into corrective actions, reaffirmed ownership, and follow-up timelines."},{"arc":"Intelligence — Why","title":"Why It Matters","body":"Execution velocity is set by the discipline of review conversations, not the sophistication of the scorecard. Execution discipline is the habit of repeatedly examining progress, confronting evidence honestly, and adjusting before small deviations become systemic failures. When the review rhythm weakens, four predictable consequences follow: early-warning signals are missed; accountability gradually diffuses (KPIs drift from operational to aspirational); organisational learning is lost (results recorded but never understood); and leadership credibility erodes (priorities look symbolic, not operational). Healthy reviews instead produce three progress signals, each needing a different response — Progress Confirmation (reinforce what worked), Early Warning (intervene while recovery is cheap — the real ROI of a review rhythm), and Significant Gap (activate the Accountability Loop and diagnose root cause rather than apply pressure or blame)."},{"arc":"Extrapolating — Where","title":"Where It Breaks Down","body":"Performance measurement rarely fails for lack of KPIs — it fails in how leaders review and interpret measurement together. Four characteristic fractures weaken the collective discipline: the Horizontal Coordination Gap (reviews happen inside functions, never across them, so each function reports progress while the enterprise outcome stays inconsistent); the Evidence Quality Gap (weak or late evidence turns reviews into interpretation debates about whether the data can be trusted); the Review Rhythm Breakdown (infrequent or irregular reviews let small deviations accumulate and signal that targets are no longer live); and the Learning Suppression Gap (evaluation-only conversations make people defend results rather than explore causes). The Alignment Brigade closes these by introducing cross-functional reviews, insisting on verifiable evidence, protecting a consistent rhythm, and balancing accountability with curiosity."},{"arc":"Integration — Collective","title":"What Was Built","body":"At enterprise level no single function can safeguard measurement integrity alone, so the executive collective runs the Enterprise Performance Intelligence Circle around a shared question: “Is the chain of execution across our functions holding together?” Each leader contributes three signals drawn from their PM review sheets across three disciplined rounds — Collective Trajectory (progress % + evidence + momentum: accelerating/stable/slowing), Early Warning Signals (subtle indicators that often prove to be cross-functional dependencies), and Execution Learning (a capability, coordination, or structural insight). A Synthesis Layer then converts the rounds into a concrete enterprise decision — naming the emerging pattern, the repeating warnings, the dependencies at risk, the weakest expectations-chain link, and the decision to take now — so the session ends in an action agreed by the Alignment Brigade, not a summary."}],"u3m2_lens8":[{"arc":"Awareness — What","title":"What Was Established","body":"A Strategic Clog is an internal blockage that prevents strategic intent from flowing into execution. The 7-clog diagnostic map gives leaders the vocabulary to name friction precisely — aligned to ABCV Directional Integrity — rather than reacting to surface symptoms."},{"arc":"Intelligence — Why","title":"Why It Matters","body":"Clogs are design signals, not failures. Where strategy stretches the operating system beyond its current capacity, friction will appear predictably. The 7 levers restore the structural, behavioural, and operational conditions that allow strategy to flow at the intended speed."},{"arc":"Extrapolating — Where","title":"Where Clogs Concentrate","body":"COMPASS provides the coordinate system for locating clogs within the enterprise execution architecture. The combination of clog category + COMPASS zone delivers diagnostic precision. The 4-step activation translates diagnosis into targeted intervention."},{"arc":"Integration — Collective","title":"What Was Built","body":"Clogs rarely stay in one lane. The Alignment Brigade must own the diagnostic conversation collectively — building a culture where surfacing friction early is an act of leadership stewardship, and the Enterprise Unclogging Agenda becomes the shared instrument of execution restoration."}],"u4m1_lens9":[{"arc":"Awareness — What","title":"What ESRG Alignment Is","body":"ESRG Alignment asks whether the organisation itself is built to sustain the performance it is being asked to deliver. Four domains decide this: Environment (its Physical infrastructure and its Behavioural conditions), Systems, Resources, and Governance. The critical output of the Behavioural Environment is the Cultural Operating Code — stated values translated into named, acronym-based norms that define observable, repeatable behaviour. Without that translation, values stay decorative and culture defaults rather than being taught."},{"arc":"Intelligence — Why","title":"Why Alignment Sustains Execution","body":"Each ESRG domain removes a specific category of friction: Environment enables, Systems streamline, Resources sustain, Governance disciplines. The ignition point of Grounding is the moment all four operate together — at which point execution no longer depends on leadership attention, because the operating system reinforces the work itself. Two worked examples make this concrete: the IBSL Cultural Operating Code, which renders values as observable behavioural norms, and the ESRG Execution Scanner, where six leaders each holding one fragment surface a consolidated verdict no single function could see alone."},{"arc":"Extrapolating — Where","title":"Where Friction Concentrates","body":"ESRG friction is predictable, and therefore preventable. In Environment it shows as workspaces lagging new ways of working (physical) and values left untranslated while psychological safety fails (behavioural). In Systems it is workarounds hardening into the de facto system and data integrity decaying into an execution problem. In Resources it is the unchallenged assumption of readiness, burnout as a strategic risk, and budgets that reveal the organisation’s real priorities. In Governance it is risk-control structures that throttle execution speed and selective enforcement that strips the system of legitimacy. Friction read this way is organisational intelligence — signal, not failure."},{"arc":"Integration Zone — Collective","title":"How Alignment Becomes Collective","body":"ESRG friction rarely stays inside one function, so Grounding requires collective commitment rather than isolated functional ownership. The Execution Muscle Scan turns each leader’s four reflections — Environment, Systems, Resources, Governance — into shared intelligence around one question: “Are the organisational conditions still supporting our ability to continue the climb?” The COMPASS–ESRG connection then maps each COMPASS zone to its primary ESRG domain and friction source, so a symptom can be traced to its structural cause. The output is the Enterprise ESRG Alignment Agenda — a leadership instrument for proactive execution architecture, not a complaint register."}],"u4m1_lens10":[{"arc":"Awareness — What","title":"What Organisational Health Is","body":"Lencioni defines organisational health as the state in which a company is whole, consistent, and complete — its management, operations, strategy, and culture fitting together and making sense. That coherence surfaces as five observable traits: minimal politics, minimal confusion, high morale, high productivity, and low turnover. But the traits are only the visible surface. The Organisational Health Pyramid explains how they are produced from the inside outward — Trust shapes Experiences, Experiences form Beliefs, Beliefs drive Actions, and Actions produce the visible Results. Addressing the visible traits directly, without repairing the deeper layers where trust and experience are formed, never works."},{"arc":"Intelligence — Why","title":"Why Health Is the Performance Ceiling","body":"Organisational health is the performance ceiling of strategy execution: it multiplies or divides every strategic system, so a strong strategy in an unhealthy organisation underperforms a moderate strategy in a healthy one. When health is strong the organisation has execution velocity — it converts ambition into consistent, sustained performance. When it deteriorates, four hidden costs surface: time lost to unclear communication and rework; quiet disengagement of capable people; declining trust as focus shifts from shared purpose to protecting turf; and emotional fatigue as people move from contribution to self-preservation. As the temperature drops, OKRs are pursued with less energy, KPI reviews turn defensive, and ESRG alignment gaps widen — the strategy stays sound while the human system that delivers it breaks down."},{"arc":"Extrapolating — Where","title":"Reading the Health Thermometer","body":"The Organisational Health Thermometer is an individual diagnostic of twenty statements — four per trait, scored 1 to 5 — producing five trait totals, a score out of 100, and a temperature band: Healthy & Thriving, Stable but Uneven, Caution Zone, or Unhealthy. Each leader completes it in silence before any team discussion, then scores are consolidated into a team view. The consolidation reveals what no individual sheet can: which traits score consistently low across the team, and which show high variance. High variance on a single trait means different people are experiencing the organisation very differently — and that difference is itself a signal worth surfacing."},{"arc":"Integration Zone — Collective","title":"Cross-CXO Health Architecture","body":"Organisational health is an executive system, not a departmental initiative. Each executive role anchors a specific health domain — the CEO clarity and leadership alignment; the CFO resource fairness; the COO operational clarity; the CHRO psychological safety and talent experience; the CTO/CIO technology-enabled productivity; the CMO purpose and meaning; the CCO commercial team health; the CPO procurement fairness; the CRO safety to raise risks; the CSO strategic coherence. When attention withdraws from any domain, the corresponding traits begin to deteriorate. No single executive can build organisational health alone — and no single executive’s neglect leaves the rest of the system intact."}],"u4m2_lens11":[{"arc":"Awareness &mdash; What","title":"Performance Gravity &amp; KISS","body":"Performance Gravity is the predictable consequence of five external forces moving while the enterprise stays still. Three mechanisms (Momentum Illusion, Complexity Creep, Execution Regression) each produced by a specific force. KISS provides the four navigation disciplines."},{"arc":"Intelligence &mdash; Why","title":"Five Forces, Five Consequences","body":"Each force produces a specific consequence when unnavigated. Competitive + Disruptive &rarr; Momentum Illusion. Macro-environmental &rarr; Complexity Creep. Social + Environmental &rarr; Legitimacy Erosion. Internal &rarr; Execution Regression. All five simultaneously &rarr; Success Inertia."},{"arc":"Extrapolating &mdash; Where &amp; How","title":"The Navigation Chain","body":"The Alignment Brigade surfaces force movements across ten leadership domains. ABCV reveals which strategic assumption each movement has invalidated. The Navigation Chain closes the loop: Force &rarr; ABCV &rarr; KISS."},{"arc":"Integration Zone &mdash; Collective","title":"The Collective Intelligence Review","body":"The S2R&reg; Collective Intelligence Review brings four instruments together in a quarterly cadence. Together they produce collective navigation intelligence &mdash; the shared awareness of which forces are active and what responses are required."}]};
  var PROMPTS={"u1_foundations":{"r_m1_intent":"Before diving in: What brings you here? What is one thing about your leadership or your organisation&#39;s strategy that you most want to understand differently by the end of this unit?","r_m2_bs":"How does the definition of behavioural strategy apply to your current context? Can you think of a recent decision in your organisation that might have been shaped by invisible mental filters?","r_m2_sys":"Think of a significant strategic decision you were involved in recently. Which system was dominant — System 1 or System 2? What were the conditions that determined which one took over?","r_m2_elephant":"In your own organisation, where does the 'Elephant Problem' most clearly show up? Which functions or perspectives tend to see very different parts of the same strategic reality?","r_m2_bias":"Which of the four bias families resonates most strongly with you personally? Which do you recognise most clearly in your organisation's culture? What is one specific way this bias has shaped a strategic decision recently?","r_m3_cxo":"Select the executive leader role that is most relevant to you. What does the internal translation reveal about your own blind spots? Where is the 'White Space' in your organisation's current strategy — the gap between functional success and enterprise outcome?","r_m3_cost":"Which of the five hidden costs is most visible in your current organisation? Can you trace it back to a specific bias family? What would it take to address it?","r_m4_phase":"At which of the four phases is your organisation currently most exposed? Use the scanner question for that phase to frame your answer. What would it mean for your strategy process if you addressed that phase more deliberately?","r_m4_climate":"Which climate type best describes your team or organisation right now? What specific leadership behaviours are creating or sustaining that climate? What is the cost of that climate to the quality of your strategy work?","r_m4 function renderResponses(payload, lensId) {

    if (!responses || typeof responses !== 'object') {
      const empty = document.createElement('div');
      empty.className = 'response-empty-card';
      empty.textContent = 'No response content was submitted.';

    // Per-lens override path (none yet)
    if (lensId && RESPONSE_OVERRIDES[lensId]) {

    // Generic walker: group by module pattern when present

      // Then the interpreted assessment card, nested inside the same body
      if (assessmentData) {
        body.appendChild(renderAssessmentCard(assessmentData));
      }

      moduleEl.appendChild(body);
      wrap.appendChild(moduleEl);
    }

    // Collapsible UX: when a submission has more than one section, collapse them
    // all by default and offer an expand/collapse-all control, so a long review
    // opens as a compact list of section headings instead of one wall of text.
    // Gated on >1 heading so single-section (and headingless flat) submissions
    // are left fully expanded — every collapsed module is guaranteed a heading
    // to re-open it. To change the default to "first section open", remove the
    // collapse loop below; to default-expanded, delete this whole block.
    const collapsibleHeadings = wrap.querySelectorAll('.response-module-heading');
    if (collapsibleHeadings.length > 1) {
      wrap.querySelectorAll('.response-module').forEach(function(m) {
        m.classList.add('collapsed');
      });
      const bar = document.createElement('div');
      bar.className = 'response-toolbar';
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'response-expand-all';
      btn.textContent = 'Expand all';
      btn.addEventListener('click', function() {
        const anyCollapsed = !!wrap.querySelector('.response-module.collapsed');
        wrap.querySelectorAll('.response-module').forEach(function(m) {
          m.classList.toggle('collapsed', !anyCollapsed);
        });
        btn.textContent = anyCollapsed ? 'Collapse all' : 'Expand all';
      });
      bar.appendChild(btn);
      wrap.insertBefore(bar, wrap.firstChild);
    }

    return wrap;
  }

  // ─── ASSESSMENT INTERPRETED CARD ───────────────────────────────────────────

  function renderAssessmentCard(data) {

    const tots = Array.isArray(data.tots) ? data.tots : [];
    const ov   = typeof data.ov === 'number' ? data.ov : tots.reduce(function(a,b){return a+(b||0);},0);

    // Score

    // Level
    let lvl = 'At Risk';
    if (ov >= 85) lvl = 'Leading Practice';

  // Recursively determine whether a value carries any real content. Used to
  // auto-expand filled nested fields (e.g. a completed SiP role) while leaving
  // empty ones collapsed.
  function fieldHasContent(value) {
    if (value === null || value === undefined || value === '') return false;
    if (typeof value === 'string') return value.trim() !== '';
    if (typeof value === 'number' || typeof value === 'boolean') return true;
    if (Array.isArray(value)) return value.some(fieldHasContent);
    if (typeof value === 'object') {
      return Object.keys(value).some(function(k) {
        return !k.startsWith('__') && fieldHasContent(value[k]);
      });
    }
    return false;
  }

  function renderFieldEntry(fieldName, value, depth, lensId) {
    depth = depth || 0;
    const wrap = document.createElement('div');
    wrap.className = 'response-field';

    const label = document.createElement('div');
    label.className = 'response-label';
    label.textContent = labelFor(fieldName, lensId);
    wrap.appendChild(label);

    const valueEl = renderValue(value, depth, lensId);

    // Nested fields (the SiP roles under "Sip Data", and anything similarly
    // structured) collapse under their own label, so a many-role submission
    // reads as a list of headings rather than one long wall. Roles that contain
    // answers start expanded; empty ones start collapsed.
    const isExpandable = depth >= 1 && value !== null && typeof value === 'object' &&
      (Array.isArray(value)
        ? value.length > 0
        : Object.keys(value).some(function(k) { return !k.startsWith('__'); }));
    if (isExpandable) {
      wrap.classList.add('response-field-collapsible');
      if (!fieldHasContent(value)) wrap.classList.add('collapsed');
      label.addEventListener('click', function() {
        wrap.classList.toggle('collapsed');
      });
    }

    wrap.appendChild(valueEl);
    return wrap;
  }

  function renderValue(value, depth, lensId) {
    // Empty / null
    if (value === null || value === undefined || value === '') {
      const e = document.createElement('span');
      e.className = 'response-empty-inline';
      e.textContent = '— not provided —';
      return e;
    }
    // String — preserve line breaks via CSS
    if (typeof value === 'string') {
      const t = document.createElement('div');
      t.className = 'response-text';
      t.textContent = value;  // textContent → no XSS
      return t;
    }
    // Number / boolean
    if (typeof value === 'number' || typeof value === 'boolean') {
      const t = document.createElement('div');
      t.className = 'response-text';
      t.textContent = String(value);
      return t;
    }
    // Array
    if (Array.isArray(value)) {
      if (value.length === 0) {
        const e = document.createElement('span');
        e.className = 'response-empty-inline';
        e.textContent = '— empty list —';
        return e;
      }
      const ul = document.createElement('ul');
      ul.className = 'response-list';
      value.forEach(function(item) {
        const li = document.createElement('li');
        if (item !== null && typeof item === 'object') {
          li.appendChild(renderValue(item, depth + 1, lensId));
        } else {
          li.textContent = String(item);
        }
        ul.appendChild(li);
      });
      return ul;
    }
    // Nested object
    if (typeof value === 'object') {
      if (depth >= 3) {
        const t = document.createElement('div');
        t.className = 'response-text';
        t.textContent = '[nested data — depth limit reached]';
        return t;
      }
      const wrap = document.createElement('div');
      wrap.className = 'response-nested';
      Object.keys(value).forEach(function(k) {
        if (k.startsWith('__')) return;
        wrap.appendChild(renderFieldEntry(k, value[k], depth + 1, lensId));
      });
      return wrap;
    }
    // Fallback
    const t = document.createElement('div');
    t.className = 'response-text';
    t.textContent = String(value);
    return t;
  }

  // ─── F4-2: FIVE COMMITMENTS ADAPTIVE DETECTION ───
  // Looks for known shapes; renders panel if found. No-op when absent.
  // Foundation's Test E payload doesn't carry it; first lens that does will trigger.
  function detectFiveCommitments(payload) {
    if (!payload || typeof payload !== 'object') return null;
    const candidates = [
      payload.five_commitments,
      payload.fiveCommitments,
      payload.responses && payload.responses.five_commitments,
      payload.responses && payload.responses.fiveCommitments
    ];
    for (let i = 0; i < candidates.length; i++) {
      const c = candidates[i];
      if (c && typeof c === 'object' && !Array.isArray(c)) {
        const keys = Object.keys(c);
        const hasOverall = keys.indexOf('overall') !== -1 || keys.indexOf('total') !== -1;
        const hasCommitments = keys.some(function(k) { return /^c\d+$/i.test(k) || /^commitment/i.test(k); });
        if (hasOverall || hasCommitments) return c;
      }
    }
    return null;
  }

  function renderFiveCommitmentsPanel(fc) {
    const panel = document.createElement('div');
    panel.className = 'fc-panel';

    const heading = document.createElement('div');
    heading.className = 'fc-panel-heading';
    heading.textContent = 'Five Commitments — Self-Score';
    panel.appendChild(heading);

    // Score grid: per-commitment scores (any keys matching c1..cN or commitmentX)
    const scoreKeys = Object.keys(fc).filter(function(k) {
      return /^c\d+$/i.test(k) || /^commitment\d+$/i.test(k) || /^commitment_\d+$/i.test(k);
    }).sort();

    if (scoreKeys.length > 0) {
      const grid = document.createElement('div');
      grid.className = 'fc-grid';
      scoreKeys.forEach(function(k) {
        const cell = document.createElement('div');
        cell.className = 'fc-cell';
        const labelEl = document.createElement('div');
        labelEl.className = 'fc-label';
        labelEl.textContent = humanizeFieldName(k);
        const scoreEl = document.createElement('div');
        scoreEl.className = 'fc-score';
        scoreEl.textContent = String(fc[k]);
        cell.appendChild(labelEl);
        cell.appendChild(scoreEl);
        grid.appendChild(cell);
      });
      panel.appendChild(grid);
    }

    // Overall row
    const overall = (fc.overall !== undefined) ? fc.overall : fc.total;
    const band    = fc.band || fc.tier || fc.level;
    if (overall !== undefined || band) {
      const row = document.createElement('div');
      row.className = 'fc-overall-row';
      if (overall !== undefined) {
        const lbl = document.createElement('span');
        lbl.className = 'fc-overall-label';
        lbl.textContent = 'Overall';
        const val = document.createElement('span');
        val.className = 'fc-overall-score';
        val.textContent = String(overall);
        row.appendChild(lbl);
        row.appendChild(val);
      }
      if (band) {
        const bandEl = document.createElement('span');
        bandEl.className = 'fc-band';
        bandEl.textContent = String(band);
        row.appendChild(bandEl);
      }
      panel.appendChild(row);
    }

    return panel;
  }

  // ─── F4-2: ACCESS-DENIED / NOT-FOUND CARDS ───
  
  // prompt-primary label hook (spec §: extracted question prompt, else verbatim humanizeFieldName)
  function labelFor(name,lensId){ var p=PROMPTS[lensId]&&PROMPTS[lensId][name]; return (p&&String(p).trim())?p:humanizeFieldName(name,lensId); }

  // ───────────────────────── helpers ─────────────────────────
  function el(tag,cls,txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
  function fatal(title,msg){ document.getElementById("root").innerHTML=""; var w=el("div","fatal"); w.appendChild(el("h2",null,title)); w.appendChild(el("p",null,msg)); document.getElementById("root").appendChild(w); }
  function fmtDate(iso){ if(!iso) return null; var d=new Date(iso); if(isNaN(d)) return null; return d.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}); }

  function renderMicroClimb(arr){
    var wrap=el("div","micro-climb");
    arr.forEach(function(s){
      var b=el("div","sum-block open");
      var h=el("div","sum-h"); h.appendChild(el("span","sum-arc",s.arc||"")); h.appendChild(el("span","sum-title",s.title||s.t||"")); b.appendChild(h);
      var body=el("div","sum-body"); body.appendChild(el("p",null,s.body||"")); b.appendChild(body);
      wrap.appendChild(b);
    });
    return wrap;
  }

  function chapterNode(cat, subs){
    var ch=el("div","chapter"); ch.id="ch-"+cat.id;
    var head=el("div","chapter-head");
    var seq=Number(cat.sequence);
    var h2=el("h2", null, seq===0 ? "Foundations" : ("Lens "+seq+" \u00b7 "+(cat.title||cat.id)));
    head.appendChild(h2);
    var latest = subs && subs.length ? subs[0] : null;
    if(latest){
      var sub=el("div","sub"); var dt=fmtDate(latest.submitted_at);
      var subText = dt ? ("Submitted "+dt) : "";
      sub.textContent = subText;
      if(typeof latest.score==="number"){
        var scoreEl = el("div","lens-score","Score: "+latest.score+" / 100");
        head.appendChild(scoreEl);
      }
      head.appendChild(sub);
    }
    ch.appendChild(head);

    if(!latest){
      ch.appendChild(el("div","not-submitted","Not yet submitted."));
    } else {
      var payload = latest.payload || {};
      ch.appendChild(el("div","section-label","Responses"));
      ch.appendChild(renderResponses(payload, cat.id));
      var fc = detectFiveCommitments(payload);
      if(fc) ch.appendChild(renderFiveCommitmentsPanel(fc));
    }

    var mc = MICRO_CLIMB[cat.id];
    if(mc && mc.length){ ch.appendChild(el("div","section-label","Micro-Climb Summary")); ch.appendChild(renderMicroClimb(mc)); }

    if(feedbackOn && latest && latest.facilitator_feedback && String(latest.facilitator_feedback).trim()){
      ch.appendChild(el("div","section-label","Facilitator Feedback"));
      var fb=el("div","feedback-block"); fb.appendChild(el("div","fb-text", String(latest.facilitator_feedback))); ch.appendChild(fb);
    }
    return ch;
  }

  function buildCover(name, cohort){
    var c=el("div","cover");
    c.appendChild(el("div","wordmark","Strategy2Results\u00ae \u00b7 Collection"));
    c.appendChild(el("h1","","Learning Portfolio"));
    c.appendChild(el("div","who", name||"\u2014"));
    var meta=el("div","meta"); meta.textContent=(cohort?("Cohort: "+cohort+"  \u00b7  "):"")+"Generated "+new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}); c.appendChild(meta);
    c.appendChild(el("div","brand","IBSLeadership \u00b7 S2R\u00ae Portal"));
    return c;
  }
  function buildToc(cats){
    var t=el("div","toc"); t.appendChild(el("h2","","Contents"));
    var ol=el("ol");
    cats.forEach(function(cat){ var seq=Number(cat.sequence); var li=el("li"); var a=el("a"); a.href="#ch-"+cat.id; a.textContent = seq===0?"Foundations":("Lens "+seq+" \u00b7 "+(cat.title||cat.id)); li.appendChild(a); ol.appendChild(li); });
    t.appendChild(ol); return t;
  }

  // ─── WS5.2: Certification Progress summary ───
  // Calls get_participant_final_score(p_profile_id, p_cohort_id). Product
  // decision: show live/partial scores, but a unit that isn't fully scored is
  // labelled "in progress — N of M lenses scored" (not a bare partial number),
  // so a mid-programme participant can't misread an incomplete tally as final.
  // The N-of-M counts come from lens_catalog units + this participant's own
  // reviewed+scored submissions (score added to the submissions select above).
  function buildCertSection(){
    var s=el("section","cert-progress");
    s.appendChild(el("h2","","Certification Progress"));
    var body=el("div","cert-body"); body.appendChild(el("div","cert-empty","Loading certification progress…"));
    s.appendChild(body); s._body=body;
    return s;
  }

  function fillCertSection(section, cohortId, cats, byLens){
    var body=section&&section._body; if(!body) return;
    // No cohort on any submission -> nothing to score against. Graceful, no error.
    if(!cohortId){ body.innerHTML=""; body.appendChild(el("div","cert-empty","No scores yet.")); return; }
    var unitLensIds={2:[],3:[],4:[]};
    cats.forEach(function(cat){ var u=Number(cat.unit); if(u>=2&&u<=4){ unitLensIds[u].push(cat.id); } });
    function unitCounts(u){
      var ids=unitLensIds[u]||[]; var n=0;
      ids.forEach(function(lid){
        var rows=byLens[lid]||[];
        for(var i=0;i<rows.length;i++){ if(rows[i].review_status==="reviewed" && typeof rows[i].score==="number"){ n++; break; } }
      });
      return {scored:n, total:ids.length};
    }
    supabaseClient.rpc("get_participant_final_score",{p_profile_id:participantId,p_cohort_id:cohortId}).then(function(res){
      if(res.error){ console.warn("[collection] get_participant_final_score:",res.error); body.innerHTML=""; body.appendChild(el("div","cert-empty","Certification progress is unavailable right now.")); return; }
      var d=Array.isArray(res.data)?res.data[0]:res.data;
      renderCert(body, d, unitCounts);
    }, function(err){ console.warn("[collection] cert rpc failed:",err); body.innerHTML=""; body.appendChild(el("div","cert-empty","Certification progress is unavailable right now.")); });
  }

  function renderCert(body, d, unitCounts){
    body.innerHTML="";
    if(!d){ body.appendChild(el("div","cert-empty","No scores yet.")); return; }
    var unitName={2:"Direction",3:"Influence",4:"Grounding"};
    [2,3,4].forEach(function(u){
      var cc=unitCounts(u);
      var row=el("div","cert-row"); row.appendChild(el("span","cert-k",unitName[u]));
      var v;
      if(cc.total>0 && cc.scored<cc.total){
        v=el("span","cert-v muted","in progress — "+cc.scored+" of "+cc.total+" lenses scored");
      } else if(cc.total>0 && cc.scored===cc.total){
        var avg=d["unit"+u+"_avg"];
        v=(avg===null||avg===undefined) ? el("span","cert-v muted","in progress") : el("span","cert-v",String(avg)+" / 100");
      } else {
        v=el("span","cert-v muted","in progress");
      }
      row.appendChild(v); body.appendChild(row);
    });
    var cap=el("div","cert-row"); cap.appendChild(el("span","cert-k","Capstone")); cap.appendChild(el("span","cert-v muted","Pending")); body.appendChild(cap);
    var pct=(d.final_pct===null||d.final_pct===undefined)?0:d.final_pct;
    var fin=el("div","cert-final");
    fin.appendChild(el("span","cert-final-label","Final"));
    fin.appendChild(el("span","cert-pct",String(pct)+"%"));
    var certified=d.certified===true;
    fin.appendChild(el("span","cert-badge "+(certified?"yes":"no"), certified?"Certified":"Not yet certified"));
    body.appendChild(fin);
    var unscored=Number(d.unscored_lens_count||0);
    if(unscored>0){ body.appendChild(el("div","cert-note", unscored+" reviewed lens"+(unscored===1?"":"es")+" not yet scored.")); }
  }

  // ───────────────────────── boot ─────────────────────────
  function boot(){
    if(!participantId){ fatal("Missing participant","This collection link needs a ?participantId=<uuid> parameter."); return; }
    supabaseClient.auth.getSession().then(function(sres){
      var session=sres&&sres.data&&sres.data.session;
      if(!session){ fatal("Not signed in","Sign in to the S2R Portal as a facilitator, then reopen this collection."); return; }
      var uid=session.user.id;
      supabaseClient.from("profiles").select("role").eq("id",uid).maybeSingle().then(function(pr){
        var role=(pr&&pr.data&&pr.data.role)||"";
        // TODO(W3-Pn): add participant self-view — allow when (uid === participantId).
        var allowed=(role==="facilitator"||role==="admin");
        if(!allowed){ fatal("Access restricted","This collection is viewable by facilitators and admins only."); return; }
        loadAndRender();
      }, function(){ fatal("Access check failed","Could not verify your role. Please refresh and try again."); });
    }, function(){ fatal("Session error","Could not read your session. Please refresh and try again."); });
  }

  function loadAndRender(){
    var catP=supabaseClient.from("lens_catalog").select("id,unit,module,sequence,title,requires_lens").order("sequence",{ascending:true});
    var subP=supabaseClient.from("submissions").select("lens_id,cohort_id,payload,submitted_at,review_status,facilitator_feedback,score").eq("profile_id",participantId).order("submitted_at",{ascending:false});
    Promise.all([catP,subP]).then(function(res){
      var cat=res[0], sub=res[1];
      if(cat.error||!cat.data||!cat.data.length){ console.error("[collection] lens_catalog read:",cat.error); fatal("Could not load chapters","The lens catalogue could not be read in this session (this needs a facilitator SELECT policy on lens_catalog). "+(cat.error?cat.error.message:"")); return; }
      if(sub.error){ console.error("[collection] submissions read:",sub.error); fatal("Could not load submissions", sub.error.message||"Read failed."); return; }
      var cats=cat.data; var subs=sub.data||[];
      // group submissions by lens_id (already newest-first)
      var byLens={}; subs.forEach(function(r){ (byLens[r.lens_id]=byLens[r.lens_id]||[]).push(r); });
      var cohortId=null; for(var i=0;i<subs.length;i++){ if(subs[i].cohort_id){ cohortId=subs[i].cohort_id; break; } }
      resolveWho(cohortId).then(function(who){
        var root=document.getElementById("root"); root.innerHTML="";
        root.appendChild(buildCover(who.name, who.cohort));
        var certSection=buildCertSection();
        root.appendChild(certSection);
        root.appendChild(buildToc(cats));
        cats.forEach(function(c){ root.appendChild(chapterNode(c, byLens[c.id]||null)); });
        // Progressive: cover/toc/chapters render now; cert section fills async.
        fillCertSection(certSection, cohortId, cats, byLens);
      });
    }, function(err){ console.error("[collection] load error:",err); fatal("Could not load","An unexpected error occurred. Please refresh."); });
  }

  // Resolve participant name + cohort name via the dashboard\u2019s RPCs (RLS-safe). Best-effort.
  function resolveWho(cohortId){
    var who={name:null,cohort:null};
    var jobs=[];
    jobs.push(supabaseClient.from("profiles").select("full_name").eq("id",participantId).maybeSingle().then(function(r){ if(r&&r.data&&r.data.full_name) who.name=r.data.full_name; },function(){}));
    jobs.push(supabaseClient.rpc("get_facilitator_cohorts").then(function(r){ if(r&&r.data){ for(var i=0;i<r.data.length;i++){ if(cohortId&&r.data[i].cohort_id===cohortId){ who.cohort=r.data[i].cohort_name; break; } } } },function(){}));
    if(cohortId){ jobs.push(supabaseClient.rpc("get_cohort_participants",{p_cohort_id:cohortId}).then(function(r){ if(r&&r.data){ for(var i=0;i<r.data.length;i++){ var p=r.data[i]; if((p.profile_id||p.id)===participantId&&p.full_name){ who.name=p.full_name; break; } } } },function(){})); }
    return Promise.all(jobs).then(function(){ return who; });
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",boot); else boot();
})();
</script>
