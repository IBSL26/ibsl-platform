<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBSL Strategy2Results® · Certificate</title>
<script src="supabase.umd.js"></script>
<style>
  :root {
    --forest: #1a3a2a;
    --forest-deep: #0d1f15;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --cream: #faf8f3;
    --ink: #1c1c1c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    background: #e9eae7;
    color: var(--ink);
    padding: 24px;
    min-height: 100vh;
  }

  .toolbar { max-width: 297mm; margin: 0 auto 18px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .congrats { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.25rem; color: var(--forest); }
  .congrats strong { color: #1d7a45; }
  .print-btn {
    background: var(--forest); color: var(--cream); border: none; cursor: pointer;
    font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 11px 20px; border-radius: 3px;
  }
  .print-btn:hover { background: var(--forest-deep); }

  .state { max-width: 297mm; margin: 40px auto; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 28px 32px; color: #444; }
  .state h2 { font-family: 'Cormorant Garamond', Georgia, serif; color: var(--forest); font-weight: 400; margin-bottom: 8px; }

  /* ── A4 portrait certificate sheet ── */
  .sheet-wrap { overflow-x: auto; }
  .sheet {
    width: 210mm; min-height: 297mm; margin: 0 auto; position: relative;
    background:
      radial-gradient(ellipse 70% 45% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%),
      var(--cream);
    border: 3px double var(--forest);            /* ornate outer double border */
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    display: flex;
  }
  /* inner thin gold rule */
  .sheet::before {
    content: ''; position: absolute; inset: 7mm; border: 1px solid var(--gold); pointer-events: none; z-index: 0;
  }
  .cert-inner {
    position: relative; z-index: 1; flex: 1;
    padding: 22mm 22mm; display: flex; flex-direction: column; align-items: center; justify-content: space-around; text-align: center;
  }
  /* small gold corner flourishes */
  .frame-corner { position: absolute; width: 15mm; height: 15mm; z-index: 2; pointer-events: none; }
  .frame-corner--tl { top: 5mm; left: 5mm;  border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .frame-corner--tr { top: 5mm; right: 5mm; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
  .frame-corner--bl { bottom: 5mm; left: 5mm;  border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .frame-corner--br { bottom: 5mm; right: 5mm; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

  /* layout groups — distribute top block / seal hero / bottom block evenly down the page */
  .cert-top { display: flex; flex-direction: column; align-items: center; width: 100%; }
  .cert-topmark { width: 100%; display: flex; justify-content: center; }
  .cert-topmark svg { width: 200px; height: auto; display: block; }       /* CESI seal — large hero mark at the top (~200px) */
  .cert-lowmark { flex: 0 0 auto; display: flex; align-items: flex-end; }
  .cert-lowmark img { width: 120px !important; height: auto; display: block; }   /* IBSL logo centred between the signatories */
  .cert-bottom { width: 100%; }

  .cert-shield { display: block; }
  .cert-institution { font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--forest); margin-top: 8px; }
  .cert-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 2.7rem; font-weight: 400; color: #1f5132; margin-top: 14px; }            /* heading: green */
  .cert-rule { width: 120px; height: 2px; background: #c9a227; margin: 12px auto 18px; }                                                              /* divider: gold */
  .cert-lead { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #8a6d10; }                                                     /* label: gold */
  .cert-name { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 2.5rem; color: #1f5132; margin: 10px 0 14px; }                            /* heading: green */
  .cert-body { font-size: 13.5px; line-height: 1.85; color: #2b2b2b; max-width: 150mm; }                                                               /* body: near-black */
  .cert-credential { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.6rem; color: #1f5132; margin-top: 16px; }                         /* heading: green */
  .cert-level-leadin { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #8a6d10; margin-top: 12px; }                            /* label: gold */
  .cert-level { display: inline-block; margin-top: 8px; padding: 8px 22px; border: 2px solid #c9a227; background: #fbf6e4; border-radius: 4px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #1f5132; }   /* level box: green text + border */
  .cert-signatories { width: 100%; display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; padding-top: 8px; }
  .sig { flex: 1; text-align: center; }
  .sig-slot { height: 44px; border-bottom: 1px solid #b9982f; margin: 0 10px 8px; }
  .sig-name { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.05rem; color: #2b2b2b; }                                                 /* names: near-black */
  .sig-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #8a6d10; margin-top: 2px; }                                      /* title labels: gold */
  .sig-seal { flex: 0 0 auto; padding: 0 6px; }
  .cert-footer { margin-top: 14px; font-size: 10px; letter-spacing: 1px; color: #6b7d76; }
  .cert-footer .foot-label { text-transform: uppercase; letter-spacing: 2px; color: #8a6d10; }                                                         /* label: gold */

  @page { size: A4 portrait; margin: 0; }
  @media print {
    body { background: #fff; padding: 0; }
    .no-print { display: none !important; }
    .sheet-wrap { overflow: visible; }
    .sheet { box-shadow: none; }
  }
</style>
</head>

  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function fatal(title, msg) {
    document.getElementById('congrats').textContent = '';
    document.getElementById('root').innerHTML =
      '<div class="state"><h2>' + escapeHtml(title) + '</h2><p>' + escapeHtml(msg) + '</p></div>';

  // ── Presentation helpers ──

  // Public credential level from the final score (rounded half-up). Returns ''
  // when below 80 / not a number, so the level block is omitted entirely.
  function levelFromScore(score) {
    const n = Math.round(Number(score));
    if (!Number.isFinite(n) || n < 80) return '';
    if (n <= 84) return 'Foundational Integrator';
    if (n <= 90) return 'Proficient Integrator';
    return 'Master Integrator';   // 91–100
  }

  async function boot() {
    if (!participantId || !cohortId) {
      fatal('Missing details', 'This certificate link needs both ?participantId=<uuid> and ?cohortId=<uuid> parameters.');
      return;
    }
    try {
      const sres = await supabaseClient.auth.getSession();
      const session = sres && sres.data && sres.data.session;
      if (!session) { fatal('Not signed in', 'Sign in to the S2R Portal as an admin or facilitator, then reopen this certificate.'); return; }

      // Role gate — admin or facilitator only (case-sensitive).
      const pr = await supabaseClient.from('profiles').select('role, full_name').eq('id', session.user.id).maybeSingle();
      const role = (pr && pr.data && pr.data.role) || '';
      if (!(role === 'admin' || role === 'facilitator')) {
        fatal('Access restricted', 'This certificate is viewable by administrators and facilitators only.');
        return;
      }

      // Fetch participant name, cohort name (via the completion report), the certificate row, and certified state.
      const results = await Promise.all([
        supabaseClient.from('profiles').select('full_name').eq('id', participantId).maybeSingle(),
        supabaseClient.rpc('get_participant_completion_report', { p_profile_id: participantId }),
        supabaseClient.from('capstone_certificate')
          .select('participant_number, final_score, issued_at')
          .eq('profile_id', participantId).eq('cohort_id', cohortId).maybeSingle()
      ]);

      const profRow = results[0];
      const repRes  = results[1];
      const certRes = results[2];

      let name = (profRow && profRow.data && profRow.data.full_name) || '';
      let cohortName = '';
      const rep = (repRes && !repRes.error && repRes.data)
        ? (Array.isArray(repRes.data) ? repRes.data[0] : repRes.data) : null;
      if (rep) {
        if (!name && rep.participant && rep.participant.full_name) name = rep.participant.full_name;
        const cohorts = Array.isArray(rep.cohorts) ? rep.cohorts : [];
        const c = cohorts.find(function(x) { return String(x.id) === String(cohortId); });
        if (c && c.name) cohortName = c.name;
      }
      if (!name) name = 'Participant';
      if (!cohortName) cohortName = 'their cohort';

      const cert = (certRes && !certRes.error) ? certRes.data : null;
      if (!cert || !cert.participant_number) {
        fatal('No certificate yet',
          'No certificate has been issued for this participant in this cohort. Issue it from the Capstone team-management page first.');
        return;
      }

      renderCertificate({
        name: name,
        cohortName: cohortName,
        finalScore: (cert.final_score === null || cert.final_score === undefined) ? '—' : cert.final_score,
        number: cert.participant_number,
        issuedAt: cert.issued_at
      });
    } catch (e) {
      console.error('[certificate] load error:', e);
      fatal('Could not load certificate', 'An unexpected error occurred. Please refresh and try again.');
    }
  }

  boot();
